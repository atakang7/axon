version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: axon
    main: ./cmd/axon
    binary: axon
    env:
      - CGO_ENABLED=0
    # Windows is intentionally excluded: agent/bg.go and agent/tool_exec.go
    # rely on POSIX process groups (syscall.Setpgid/Getpgid/Kill). Adding
    # Windows would require a separate background-shell implementation.
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - id: axon
    name_template: "axon_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  disable: true

release:
  github:
    owner: atakang7
    name: axon
  draft: false
  prerelease: auto
  mode: append
